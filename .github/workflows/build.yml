name: Build & Deploy Dashboard

on:
  repository_dispatch:
    types: [data-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout theta-data
        uses: actions/checkout@v4
        with:
          repository: xxxxxthhh/theta-data
          token: ${{ secrets.GH_PAT }}
          path: theta-data

      - name: Copy source data
        run: |
          cp theta-data/options-history-since-feb.md .
          if [ -f theta-data/market_data.json ]; then
            cp theta-data/market_data.json .
          else
            echo '{}' > market_data.json
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard
        run: node src/build.js
        env:
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "build: update dashboard $(date '+%Y-%m-%d')"
            git push
          else
            echo "No changes to deploy"
          fi
